// Russian name declension (basic patterns)
function decl(name) {
  const n = name.trim();
  if (!n) return {и:n,р:n,д:n,в:n,п:n};
  const last = n.slice(-1).toLowerCase();
  const l2 = n.length > 1 ? n.slice(-2).toLowerCase() : '';
  if (last === 'а') {
    const s = n.slice(0,-1), b = s.slice(-1).toLowerCase();
    const h = 'гкхжшщч'.includes(b);
    return {и:n, р:s+(h?'и':'ы'), д:s+'е', в:s+'у', п:s+'е'};
  }
  if (last === 'я') {
    const s = n.slice(0,-1);
    if (l2 === 'ия') return {и:n, р:s+'и', д:s+'и', в:s+'ю', п:s+'и'};
    return {и:n, р:s+'и', д:s+'е', в:s+'ю', п:s+'е'};
  }
  if (last === 'й') {
    const s = n.slice(0,-1);
    if (l2 === 'ий') return {и:n, р:s+'я', д:s+'ю', в:s+'я', п:s+'и'};
    return {и:n, р:s+'я', д:s+'ю', в:s+'я', п:s+'е'};
  }
  if (last === 'ь') {
    const s = n.slice(0,-1);
    return {и:n, р:s+'я', д:s+'ю', в:s+'я', п:s+'е'};
  }
  if ('бвгджзклмнпрстфхцчшщ'.includes(last))
    return {и:n, р:n+'а', д:n+'у', в:n+'а', п:n+'е'};
  return {и:n, р:n, д:n, в:n, п:n};
}

      "Наша задача — не сдаваться, а молиться до тех пор, пока враг не будет выбит со своей позиции.",
    ],
    tq: { t: "«Если же и закрыто благовествование наше, то закрыто для погибающих, для неверующих, у которых бог века сего ослепил умы, чтобы для них не воссиял свет благовествования о славе Христа, Который есть образ Бога невидимого».", r: "2 Кор. 4:3–4" },
    ta: ["Павел называет врага «богом века сего». Не потому, что он действительно бог — а потому что в жизни этих людей он занял место Бога, и они даже не видят этого. Они уверены, что они сами так думают, сами так решают. На самом деле они смотрят на мир через линзу, которую им поставили.", "За таких людей нужно усиленно молиться, чтобы сразить сатану. Просто проповедовать бесполезно — сколько бы раз ты ни рассказывал, слово будет унесено той же птицей. Но через молитву мы можем разрушить эту ложную линзу и дать человеку возможность увидеть свет Евангелия."],
    who: ["Годами живёт рядом с верующими — остаётся совершенно равнодушным.", "На любой разговор о Боге реагирует раздражением, насмешкой или уходит от темы.", "Слушает свидетельство — и через минуту всё забывает, как будто стёрли ластиком.", "Воинствующие безбожники и атеисты, активно отрицающие существование Бога.", "Люди в тяжёлых зависимостях: алкоголь, наркотики, игромания, порнография — ум не только ослеплён, но и порабощён.", "Занимающиеся оккультизмом, колдовством, экстрасенсорикой, гаданиями, спиритизмом — сознательно открыли жизнь для тёмных сил.", "Последователи ложных религий и сект.", "Те, кто открыто противостоит Богу, богохульствует, преследует верующих.", "После встречи с верующим — ни вопросов, ни сомнений, ни любопытства."],
    hpf: ["За таких людей просто проповедовать бесполезно. Сколько бы раз ты ни рассказывал — слово будет унесено той же птицей. Здесь нужна духовная война. Мы молимся не просто о человеке, но против того, что держит его ум. Нам нужно разбить твердыню ослепления.", "Что такое твердыня? Это система мыслей, идей и верований, которая крепко стоит в сознании человека и мешает ему принять Христа. Это может быть атеизм, ложная религия, гордыня ума, боль и травмы прошлого. Твердыня сама по себе не исчезнет. Её нужно разрушать — и делается это в молитве.", "Поэтому молитва за первую почву — это не просьба в стиле «Господи, сделай что-нибудь». Это твёрдое занятие позиции против духа ослепления, с использованием власти, данной нам Иисусом. Мы повелеваем духу, который мешает, оставить ум этого человека. Мы разрушаем ложь. Мы открываем путь для света Евангелия."],
    hpq: { t: "«Оружия воинствования нашего не плотские, но сильные Богом на разрушение твердынь: ими ниспровергаем замыслы и всякое превозношение, восстающее против познания Божия, и пленяем всякое помышление в послушание Христу».", r: "2 Кор. 10:4–5" },
    prayer: ["Отец Небесный! Во имя Иисуса Христа я прихожу к Тебе в молитве за {в}. Ты видишь его сердце, Ты знаешь всю его историю, Ты любишь его больше, чем люблю я. Я прошу Тебя: спаси его. Он куплен драгоценной Кровью Иисуса Христа, и я верю, что он предназначен для Царствия Божьего.", "Я вижу, что его ум ослеплён, а сердце закрыто. Я знаю, что это не его выбор — это работа врага. Поэтому сейчас я выступаю против духа ослепления, который держит этого человека. Во имя Иисуса Христа я повелеваю тебе, бес, оставь ум {р} и убирайся вон! Дух ослепления, дух неверия, дух равнодушия — вы не имеете законной власти жить в разуме человека, искупленного Кровью Иисуса. Оставьте его и выйдите из него!", "Именем Иисуса Христа я разрушаю каждую твердыню, каждую ложь, каждую систему мышления, которая восстаёт против познания Бога в жизни этого человека. Я ниспровергаю всякое превозношение ума, всякий замысел врага, всякий аргумент, всякое оправдание, которое не даёт ему прийти к Тебе.", "Господь Иисус, я прошу Тебя: дай ему прозрение. Открой его духовные глаза. Просвети его разум. Сделай его способным увидеть свет Евангелия и принять Твоё вечное спасение. Пошли ему нужных людей, нужные обстоятельства, нужное слово в нужное время.", "Я благодарю Тебя за то, что Ты отвечаешь на эту молитву. Ты силён спасти до конца. Я становлюсь в молитвенную брешь за этого человека и не оставлю её, пока не увижу Твоего ответа. Во имя Иисуса Христа, аминь."],
    pn: "После этой молитвы хорошо продолжить на иных языках. Дух Святой лучше нас знает, что именно держит человека, и разберётся с любой проблемой точнее, чем это может сделать наш разум.",
    si: "Эти стихи — оружие для молитвенной войны. Молитесь ими вслух, применяя к конкретному человеку. Например: «Господь, по слову Твоему из 2 Кор. 10:4–5, я разрушаю твердыни в жизни {р}».",
    sc: [{ r: "2 Кор. 10:4–5", t: "Оружия воинствования нашего не плотские, но сильные Богом на разрушение твердынь: ими ниспровергаем замыслы и всякое превозношение, восстающее против познания Божия, и пленяем всякое помышление в послушание Христу." }, { r: "2 Кор. 4:3–4", t: "Если же и закрыто благовествование наше, то закрыто для погибающих, для неверующих, у которых бог века сего ослепил умы, чтобы для них не воссиял свет благовествования о славе Христа." }, { r: "Иак. 4:7", t: "Итак покоритесь Богу; противостаньте диаволу, и убежит от вас." }, { r: "1 Ин. 3:8", t: "Кто делает грех, тот от диавола, потому что сначала диавол согрешил. Для сего-то и явился Сын Божий, чтобы разрушить дела диавола." }, { r: "Лк. 10:18–19", t: "Он же сказал им: Я видел сатану, спадшего с неба, как молнию; се, даю вам власть наступать на змей и скорпионов и на всю силу вражью, и ничто не повредит вам." }, { r: "Деян. 26:18", t: "Открыть глаза им, чтобы они обратились от тьмы к свету и от власти сатаны к Богу, и верою в Меня получили прощение грехов и жребий с освящёнными." }, { r: "Ис. 42:7", t: "Чтобы открыть глаза слепых, чтобы узников вывести из заключения и сидящих во тьме — из темницы." }],
    heroes: [{ n: "Моника и Августин", s: "Моника молилась о своём сыне Августине семнадцать лет. Он был блестяще образован, жил с наложницей, увлекался ложными учениями, избегал матери из-за её веры. Моника плакала о нём годами и постилась. Один епископ сказал ей: «Сын таких слёз не может погибнуть». Августин обратился в 32 года и стал одним из величайших учителей церкви за всю её историю." }, { n: "Джордж Мюллер — 52 года молитвы", s: "Известный молитвенник из Англии, содержавший тысячи сирот только на средства от Бога, молился о пятерых друзьях. Первый обратился через 5 лет. Второй через 10. Третий и четвёртый через 25. О пятом молился каждый день 52 года. Этот друг обратился уже после смерти Мюллера, на его похоронах." }, { n: "Рис Хауэллс", s: "Валлиец, проводивший в молитве за конкретных людей по нескольку дней без еды. Говорил: «Молитвенник не просто просит. Молитвенник занимает место и не уходит, пока дверь не откроется». В его жизни были случаи, когда он молился неделю — и на седьмой день человек за много километров внезапно обращался к Богу." }],
  },
  2: { icon: "🪨", name: "На камне", c: C.s2, cs: C.s2s, sh: "Каменное сердце, отпадение от веры",
    verse: "Лк. 8:13", vt: "«А упавшее на камень, это те, которые, когда услышат слово, с радостью принимают, но которые не имеют корня, и временем веруют, а во время искушения отпадают».",
    teach: ["Каменистая почва — это тонкий слой земли, а под ним каменная плита. Семя попадает в землю, сразу прорастает и даже радует глаз. Но корень не может уйти вглубь — упирается в камень. Пока идут дожди, всё хорошо. А как только приходит засуха или жара — растение засыхает, потому что нет корня, питающего его изнутри.", "В жизни это люди, которые когда-то приняли Христа. Они ходили в церковь, радовались, может быть, даже горели. А потом отошли. К этой категории относится немало людей. Они были в церкви и получили прощение грехов, но потом вновь начали жить как прежде — стали отступниками. Они также имеют право на спасение и оправдание от Бога.", "Сердце не становится каменным за один день. Это постепенный процесс. Сначала один грех, не отпущенный Богу. Потом обида, которая не прощена. Потом разочарование. Каждый такой момент добавляет ещё один слой в тот камень, что накапливается в сердце. И в какой-то момент человек сам уже не замечает, что внутри у него больше не живая земля, а твёрдая плита.", "Почему Иисус, говоря об этой категории людей, привёл пример семени, упавшего на камень? Сердце человека может стать каменным из-за греха, неверия, сомнений. Но Бог обещает дать человеку плотяное сердце взамен каменного."],
    tq: { t: "«И дам вам сердце новое, и дух новый дам вам; и возьму из плоти вашей сердце каменное, и дам вам сердце плотяное».", r: "Иез. 36:26" },
    ta: ["Это не образное выражение. Это прямое обетование Бога: Он вытаскивает каменное сердце и даёт новое — живое, мягкое, способное снова слышать Его.", "Доказательством служит библейская история об апостоле Петре. Будучи учеником Иисуса, во время искушения он отступил и отрёкся от Спасителя трижды. В глазах многих Пётр стал предателем и отступником, но только не в глазах Господа. Иисус молился о нём заранее: «Я молился о тебе, чтобы не оскудела вера твоя». Молитва опередила падение.", "Пётр не имел глубоких корней в учении Христа, поэтому во время гонений смалодушничал. Но Иисус молился за этого человека, и молитва Иисуса совершила свою работу. Пётр, покаявшись, вернулся в состояние ученичества и стал одним из самых великих людей веры Нового Завета, пожертвовав за свои убеждения жизнью."],
    who: ["Был в церкви, активно служил или посещал — а теперь ушёл.", "При разговоре о Боге — и грусть, и раздражение одновременно.", "Говорит: «Я это уже пробовал», «Я разочаровался», «Это не для меня».", "Внешне вернулся к прежней жизни, но внутри часто тоска.", "Избегает встреч с прежними братьями и сёстрами.", "Иногда, наоборот, агрессивно критикует церковь или верующих."],
    hpf: ["Главная молитва здесь — не о войне с внешним врагом, а о работе Святого Духа внутри человека. Мы просим Бога сделать то, что Он обещал: вытащить камень и дать живое сердце. Это прямое Божье обетование, и мы просто просим Бога исполнить его.", "Очень важно не смотреть на отпавшего свысока. Это не «хуже нас человек». Это Пётр — в его истории ещё не дописана последняя глава. Иисус не стыдился Петра после отречения. Он встретил его на берегу моря, задал ему трижды вопрос «любишь ли Меня?» — ровно столько раз, сколько было отречений — и полностью восстановил. С такой же верой мы молимся и о нашем знакомом, который отошёл."],
    hpq: { t: "«Симон! Симон! Се, сатана просил, чтобы сеять вас как пшеницу, но Я молился о тебе, чтобы не оскудела вера твоя; и ты некогда, обратившись, утверди братьев твоих».", r: "Лк. 22:31–32" },
    prayer: ["Отец Небесный! Во имя Иисуса Христа я прихожу к Тебе в молитве за {в}. Ты видишь его сердце лучше, чем вижу я. Ты знаешь, что произошло, когда и почему его сердце стало каменным.", "Я прошу: исполни обетование из Иезекииля. Ты сказал: «Возьму из плоти вашей сердце каменное и дам вам сердце плотяное». Сделай это сейчас. Убери ожесточение, горечь, обиды, разочарование, страх, гордыню. Дай новое сердце — живое, мягкое, способное снова слышать Твой голос.", "Пусть Твоё слово, как молот, сокрушит этот камень. Пусть Твоя любовь растопит лёд. Пусть Твой Дух, как дождь, напитает иссохшую почву. Напиши Свои законы на новом плотяном сердце.", "Господь Иисус, как Ты молился о Петре, чтобы не оскудела его вера, — так я молюсь о {п}. Ты не оставил Петра после отречения. Встреться и с этим человеком. Пусть Твоя встреча будет такой же тёплой, как на берегу Тивериадского моря.", "Убери из его пути ложный стыд, страх насмешек, гордыню, которая говорит «поздно». Покажи, что Ты ждёшь его, как отец ждал блудного сына. Дай мне мудрость не осуждать, не торопить. Во имя Иисуса Христа, аминь."],
    pn: "Продолжить молитву хорошо на иных языках — Дух Святой точно знает, какой корень держит этого человека.",
    si: "Этими стихами мы «напоминаем» Богу Его обетования и просим исполнить их в жизни конкретного человека.",
    sc: [{ r: "Иез. 36:26–27", t: "И дам вам сердце новое, и дух новый дам вам; и возьму из плоти вашей сердце каменное, и дам вам сердце плотяное. Вложу внутрь вас дух Мой." }, { r: "Иез. 11:19–20", t: "И дам им сердце единое, и дух новый вложу в них, и возьму из плоти их сердце каменное, и дам им сердце плотяное." }, { r: "Иер. 23:29", t: "Слово Моё не подобно ли огню, говорит Господь, и не подобно ли молоту, разбивающему скалу?" }, { r: "Лк. 22:31–32", t: "Сатана просил, чтобы сеять вас как пшеницу, но Я молился о тебе, чтобы не оскудела вера твоя." }, { r: "Лк. 15:20", t: "И когда он был ещё далеко, увидел его отец его и сжалился; и, побежав, пал ему на шею и целовал его." }, { r: "Ос. 6:1–3", t: "Пойдём и возвратимся к Господу! Ибо Он уязвил — и Он исцелит нас, поразил — и перевяжет наши раны." }, { r: "Откр. 2:4–5", t: "Ты оставил первую любовь твою. Вспомни, откуда ты ниспал, и покайся, и твори прежние дела." }],
    heroes: [{ n: "Джон Буньян", s: "Автор «Путешествия пилигрима». После обращения несколько лет жил в мучительном страхе, что «продал Христа». Молитвы жены и братьев провели его через это. 12 лет в тюрьме — и именно там его вера пустила корень. В тюрьме написал книгу, которую прочли сотни миллионов." }, { n: "Джон Ньютон", s: "Автор «О, благодать». Верующая мать умерла когда ему было 7 лет. Стал моряком, работорговцем. В страшном шторме в Атлантике впервые за 30 лет начал молиться. Молитвы матери догнали его посреди океана." }, { n: "Чарльз Сперджен", s: "Много внимания уделял «потухшим углям». Говорил: «Даже если огонь в очаге погас, угли ещё горячие. Подуй на них с любовью — и пламя вернётся». Сотни людей в его церкви возвращались через годы и десятилетия." }],
  },
  3: { icon: "🌿", name: "В тернии", c: C.s3, cs: C.s3s, sh: "Заботы, успех и увлечения заглушают слово",
    verse: "Лк. 8:14", vt: "«А упавшее в терние, это те, которые слушают слово, но, отходя, заботами, богатством и наслаждениями житейскими подавляются и не приносят плода».",
    teach: ["Это самая хитрая почва из всех четырёх. Здесь семя прорастает. Вера как будто есть. Человек слышит слово, соглашается с ним, может быть даже говорит: «Да, я знаю, что это правда». Но рядом с верой растёт ещё что-то — и постепенно заглушает её. Плода нет.", "Иисус называет три вида сорняков: заботы, богатство и наслаждения житейские. Важный момент: ни одно из этих слов само по себе не означает грех. Забота о семье — хорошо. Материальное благополучие — часто Божье благословение. Отдых и радость — дар Божий. Проблема не в самих вещах, а в том, что они занимают место Бога.", "Сорняки часто выглядят как добрые дела. Бизнес, карьера, искусство, спорт, политика, учёба, забота о детях, даже служение в церкви — всё это нужно. Но если они становятся смыслом жизни и заслоняют Иисуса Христа — они превращаются в терние. Человек не делает ничего «плохого». Он просто «занят». И откладывает самое главное."],
    tq: { t: "«Никто, возложивший руку свою на плуг и озирающийся назад, не благонадёжен для Царствия Божия».", r: "Лк. 9:62" },

    verse: "Лк. 8:15", vt: "«А упавшее на добрую землю, это те, которые, услышав слово, хранят его в добром и чистом сердце и приносят плод в терпении».",
    teach: ["Данная категория людей — это почва, над которой уже потрудились. Этих людей нужно просто привести к покаянию. Они уже готовы. Здесь нельзя терять времени — есть те, кого можно спасти уже сегодня.", "Добрая земля не родилась такой. Когда-то и этот человек, возможно, был первой, второй или третьей почвой. Но кто-то молился за него. Может быть, его мама. Может быть, незнакомый молитвенник из другой страны. Может быть, за него молилось целое поколение — бабушка, прабабушка. А может быть, Сам Дух Святой совершил работу через обстоятельства: болезнь, потерю, развод, кризис.", "Есть категория людей, которые готовы принять слово Божье прямо сейчас, поэтому нельзя терять времени. Над кем-то надо трудиться, молиться и верить, а кто-то уже готов для спасения. Наша задача — не пройти мимо готовой души.", "Многие христиане тратят годы на молитву за первые три почвы — и при этом каждый день мимо них проходят люди четвёртой почвы, которых они просто не замечают."],

    hpf: ["Главная молитва — не о разрушении, а о направлении и зоркости. Просим Бога показать готовых людей и послать навстречу. Проблема не в том, что нет готовых — а в том, что мы не смотрим в их сторону.", "Молитва за четвёртую почву — во многом молитва о духовном зрении самого молящегося. Бог очень быстро отвечает тем, кто ищет Его готовых сердец. Иногда прямо после молитвы — встреча с готовым человеком в магазине, в автобусе, у подъезда."],

    prayer: ["Отец Небесный! Во имя Иисуса Христа я прихожу к Тебе в молитве за {в}. Я верю, что Ты уже подготовил его сердце и что он близок к Тебе как никогда прежде. Доведи начатое до конца — приведи его к полному познанию Тебя.", "Господь, я прошу: открой духовные глаза {р}. Дай ему ясно увидеть Твою любовь, Твой план для его жизни, Твоё спасение. Убери последние преграды, которые стоят между ним и Тобой. Пусть он не просто слышит о Тебе — пусть он встретит Тебя лично.", "Пошли к {д} нужных людей в нужное время. Дай ему услышать именно то слово, которое откроет его сердце до конца. Пусть Дух Святой коснётся его так сильно, что он не сможет пройти мимо. Сделай эту встречу с Тобой неотвратимой.", "Отец, я прошу: дай {д} смелость принять решение. Убери страх, сомнения, стыд, чужие мнения — всё, что может остановить его на последнем шаге. Дай ему понять, что сегодня — день спасения, что откладывать больше нельзя.", "Господь Иисус, Ты сказал, что нивы побелели и поспели к жатве. Я верю, что {и} — это готовая нива. Собери этот плод. Пусть он придёт к Тебе, примет Тебя и станет Твоим учеником. Пусть Имя Твоё прославится через спасение {р}. Во имя Иисуса Христа, аминь."],

// ─── APP ─────────────────────────────────────────────────────────────
function App() {
  const [tab, setTab] = useState("list"); const [ppl, setPpl] = useState([]); const [ok, setOk] = useState(false);
  const [showAdd, setShowAdd] = useState(false); const [pray, setPray] = useState(null); const [tch, setTch] = useState(null);
  const [mid, setMid] = useState(null); const [delConfirm, setDelConfirm] = useState(null);
  useEffect(() => { load().then(d => { setPpl(d); setOk(true); }); }, []);
  useEffect(() => { if (ok) save(ppl); }, [ppl, ok]);
  const add = (n, s, nt) => { setPpl(p => [...p, { id: Date.now()+"", name: n, soil: s, note: nt, td: 0, st: 0, ld: null }]); setShowAdd(false); };
  const del = id => { setPpl(p => p.filter(x => x.id !== id)); setDelConfirm(null); setMid(null); };
  const cyc = id => { setPpl(p => p.map(x => x.id === id ? { ...x, soil: x.soil === 4 ? 1 : x.soil + 1 } : x)); setMid(null); };
  const mark = id => { const d = today(); setPpl(p => p.map(x => { if (x.id !== id || x.ld === d) return x; const y = new Date(Date.now()-864e5).toISOString().slice(0,10); return { ...x, td: x.td+1, st: x.ld===y ? x.st+1 : 1, ld: d }; })); };
  const sub = t => t.replace(/\(имя\)/g, pray ? (ppl.find(x=>x.id===pray)||{}).name||"" : "").replace(/\(назовите имя\)/g, pray ? (ppl.find(x=>x.id===pray)||{}).name||"" : "");

  if (pray) { const p = ppl.find(x => x.id === pray); if (!p) { setPray(null); return null; } return <PM p={p} s={SOILS[p.soil]} done={() => { mark(p.id); setPray(null); }} close={() => setPray(null)} />; }
  if (tch) return <TD s={SOILS[tch]} n={tch} back={() => setTch(null)} />;

  const TB = ({ id, l }) => <button onClick={() => setTab(id)} style={{ padding: "8px 16px", borderRadius: 20, border: `1px solid ${tab===id?C.pr:C.ln}`, background: tab===id?C.pr:"transparent", color: tab===id?"#fff":C.ink, fontSize: 14, fontFamily: "inherit", cursor: "pointer" }}>{l}</button>;

  return (
    <div style={{ minHeight: "100vh", background: C.bg, fontFamily: "Georgia, serif" }}>
      {/* HEADER */}
      <div style={{ background: C.bg, borderBottom: `1px solid ${C.ln}`, position: "sticky", top: 0, zIndex: 50, padding: "10px 16px 0" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 8 }}>
          <Logo size={34} />
          <div><div style={{ fontSize: 15, fontWeight: "bold", color: C.pr }}>Церковь Свет Миру</div><div style={{ fontSize: 11, color: C.ink3, fontStyle: "italic" }}>молитвенник по четырём почвам</div></div>
        </div>
        <div style={{ display: "flex", gap: 4, paddingBottom: 10 }}><TB id="list" l="🙏 Мой список" /><TB id="teach" l="📖 Учение" /></div>
      </div>

      <div style={{ padding: "16px 16px 120px", maxWidth: 600, margin: "0 auto" }}>
        {/* ── LIST ── */}
        {tab==="list" && <>
          {ppl.length===0 && !showAdd && <div style={{ textAlign: "center", padding: "50px 20px" }}><div style={{display:"flex",justifyContent:"center"}}><Logo size={64} /></div><div style={{ fontSize: 20, fontWeight: "bold", color: C.pr, margin: "16px 0 8px" }}>Ваш молитвенный список пуст</div><p style={{ color: C.ink2, lineHeight: 1.6, marginBottom: 24 }}>Добавьте человека, за которого хотите молиться, выберите тип почвы — и приложение покажет, как именно за него молиться.</p><button onClick={() => setShowAdd(true)} style={{ background: C.pr, color: "#fff", border: "none", padding: "14px 28px", borderRadius: 24, fontSize: 16, fontFamily: "inherit", cursor: "pointer" }}>+ Добавить человека</button></div>}
          {ppl.length>0 && <><div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}><div style={{ fontSize: 13, color: C.ink3 }}>{ppl.length} чел. • {ppl.filter(p => p.ld===today()).length} сегодня</div><button onClick={() => setShowAdd(true)} style={{ background: C.pr, color: "#fff", border: "none", padding: "7px 14px", borderRadius: 16, fontSize: 13, fontFamily: "inherit", cursor: "pointer" }}>+ Добавить</button></div>
            {ppl.map(p => { const s = SOILS[p.soil]; const dn = p.ld===today(); return <div key={p.id} style={{ background: C.el, borderRadius: 12, border: `1px solid ${C.ln}`, borderLeft: `4px solid ${s.c}`, marginBottom: 10 }}>
              <div style={{ padding: "12px 14px 8px", display: "flex", justifyContent: "space-between" }}>
                <div style={{ flex: 1 }}><div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap", marginBottom: 3 }}><span style={{ fontSize: 17, fontWeight: "bold", color: C.ink }}>{p.name}</span><span style={{ fontSize: 11, padding: "2px 8px", borderRadius: 10, background: s.cs, color: s.c, fontWeight: "bold" }}>{s.icon} {s.name}</span></div>{p.note && <div style={{ fontSize: 13, color: C.ink3, marginBottom: 3 }}>{p.note}</div>}<div style={{ display: "flex", gap: 12, fontSize: 12, color: C.ink3 }}><span>📅 {p.td} дн.</span>{p.st > 1 && <span>🔥 {p.st} подряд</span>}</div></div>
                <button onClick={() => setMid(mid===p.id?null:p.id)} style={{ background: "none", border: "none", fontSize: 18, cursor: "pointer", color: C.ink3, padding: 4 }}>⋮</button>
              </div>
              {mid===p.id && <div style={{ padding: "0 14px 8px", display: "flex", gap: 6 }}>
                <MB l="✏️ Сменить почву" o={() => cyc(p.id)} />
                <MB l="🗑️ Удалить" c={C.s1} o={() => setDelConfirm(p.id)} />
              </div>}
              {/* DELETE CONFIRMATION */}
              {delConfirm===p.id && <div style={{ padding: "10px 14px", background: "#FFF0F0", borderTop: `1px solid ${C.s1}44` }}>
                <div style={{ fontSize: 14, color: C.s1, marginBottom: 8 }}>Удалить <b>{p.name}</b> из списка?</div>
                <div style={{ display: "flex", gap: 8 }}>
                  <button onClick={() => del(p.id)} style={{ padding: "8px 16px", background: C.s1, color: "#fff", border: "none", borderRadius: 8, fontSize: 13, fontFamily: "inherit", cursor: "pointer" }}>Да, удалить</button>
                  <button onClick={() => setDelConfirm(null)} style={{ padding: "8px 16px", background: "transparent", border: `1px solid ${C.ln}`, color: C.ink, borderRadius: 8, fontSize: 13, fontFamily: "inherit", cursor: "pointer" }}>Отмена</button>
                </div>
              </div>}
              <div style={{ display: "flex", borderTop: `1px solid ${C.ln}` }}>
                <button onClick={() => mark(p.id)} style={{ flex: 1, padding: 10, border: "none", borderRight: `1px solid ${C.ln}`, background: dn?C.s4s:"transparent", color: dn?C.s4:C.ink, fontSize: 13, fontFamily: "inherit", cursor: "pointer", fontWeight: dn?"bold":"normal" }}>{dn?"✓ Помолился":"Помолился"}</button>
                <button onClick={() => setPray(p.id)} style={{ flex: 1, padding: 10, border: "none", background: "transparent", color: C.pr, fontSize: 13, fontFamily: "inherit", cursor: "pointer", fontWeight: "bold" }}>Начать молитву →</button>
              </div>
            </div>; })}</>}
          {showAdd && <AF add={add} cancel={() => setShowAdd(false)} />}
        </>}
        {/* ── TEACH ── */}
        {tab==="teach" && <>
          <h1 style={{ fontSize: 24, color: C.pr, marginBottom: 4 }}>Учение о четырёх почвах</h1>
          <p style={{ color: C.ink2, fontSize: 15, lineHeight: 1.6, marginBottom: 14 }}>Однажды Иисус рассказал собравшемуся народу притчу:</p>
          <Q t="«Вышел сеятель сеять семя своё, и когда он сеял, иное упало при дороге и было потоптано, и птицы небесные поклевали его; а иное упало на камень и, взойдя, засохло, потому что не имело влаги; а иное упало между тернием, и выросло терние и заглушило его; а иное упало на добрую землю и, взойдя, принесло плод сторичный. Сказав сие, возгласил: кто имеет уши слышать, да слышит!»" r="Лк. 8:5–8" />
          <p style={{ color: C.ink2, fontSize: 15, lineHeight: 1.6, marginBottom: 14 }}>Иисус объяснил ученикам: семя — это слово Божье, а почва — сердце человека. Из четырёх людей, услышавших слово, только один легко принимает его и спасается. Но это не значит, что трое остальных обречены. Просто чтобы спасти остальных, церкви придётся потрудиться засучив рукава.</p>
          <p style={{ color: C.ink2, fontSize: 15, lineHeight: 1.6, marginBottom: 14 }}>У Бога нет определённого процента людей, которые должны спастись. Он хочет спасти каждого человека. Но для этого нужна сильная молитва. Молитва — это необходимая цена, которую нужно принести, чтобы человек пришёл к спасению. И социальный статус, и материальное положение здесь не играют роли.</p>
          <p style={{ color: C.ink2, fontSize: 15, lineHeight: 1.6, marginBottom: 14 }}>Имена спасённых записываются в книге жизни. Апостол Иоанн, увидев эту книгу в видении, плакал, потому что не находилось никого, кто мог бы открыть её, — а значит, спасение человечества было под угрозой. Для того чтобы книга была открыта, к Иисусу пришли старцы с чашами, полными фимиама, или, как поясняет Писание, молитв святых:</p>
          <Q t="«И когда Он взял книгу, тогда четыре животных и двадцать четыре старца пали пред Агнцем, имея каждый гусли и золотые чаши, полные фимиама, которые суть молитвы святых»." r="Откр. 5:8" />
          <p style={{ color: C.ink2, fontSize: 15, lineHeight: 1.6, marginBottom: 14 }}>Это были долгие ходатайственные молитвы, принесённые по всему лицу земли за живущих на ней. Цена была полностью уплачена, поэтому пришёл Агнец и открыл книгу, из-за чего люди смогли войти в небеса. Чем больше церковь молится — тем больше возможностей появляется в духовном мире для спасения людей на земле.</p>
          <Q t="«И кто не был записан в книге жизни, тот был брошен в озеро огненное»." r="Откр. 20:15" />
          <p style={{ color: C.ink2, fontSize: 15, lineHeight: 1.6, marginBottom: 14 }}>Те, чьих имён не окажется в книге жизни, будут брошены в озеро огненное. Но их количество может уменьшиться, если церковь включится в серьёзную молитвенную работу. И молитва по каждой почве — своя. За одного нужно воевать с духом ослепления. За другого — просить о замене сердца. Третьему — о выжигании тернов. Четвёртый уже готов: его нужно просто встретить.</p>
          {[1,2,3,4].map(n => { const s = SOILS[n]; return <button key={n} onClick={() => setTch(n)} style={{ width: "100%", textAlign: "left", padding: 16, marginBottom: 8, background: C.el, border: `1px solid ${C.ln}`, borderLeft: `4px solid ${s.c}`, borderRadius: 10, cursor: "pointer", fontFamily: "inherit" }}><div style={{ fontSize: 11, fontWeight: "bold", color: C.ink3, letterSpacing: "0.1em", textTransform: "uppercase" }}>Почва {n}</div><div style={{ fontSize: 18, fontWeight: "bold", color: C.ink, margin: "2px 0 4px" }}>{s.icon} {s.name}</div><div style={{ fontSize: 14, color: C.ink2 }}>{s.sh}</div></button>; })}
          <div style={{ marginTop: 20, padding: 16, background: C.sf, borderRadius: 10 }}><h3 style={{ fontSize: 16, color: C.pr, marginBottom: 8 }}>Главная идея</h3><p style={{ fontSize: 14, color: C.ink, lineHeight: 1.6, marginBottom: 10 }}>Три из четырёх почв требуют серьёзной молитвы, прежде чем семя принесёт плод. Большая часть труда церкви происходит не на кафедре и не на улице — а в комнате у молящегося. Часто в одиночку, без видимых плодов, годами. Но именно эта молитва наполняет золотые чаши перед престолом Бога и открывает книгу жизни.</p><p style={{ fontSize: 14, color: C.ink, lineHeight: 1.6, marginBottom: 10 }}>Если у вас есть хотя бы одно имя, которое вы носите на сердце годами, — начните молиться за него по той почве, к которой он относится. У Бога нет «процента спасённых». Он хочет спасти каждого. И делает это через молитвы Своих детей.</p><Q t="«Много может усиленная молитва праведного»." r="Иак. 5:16" /></div>
          <div style={{ marginTop: 12, padding: 16, background: C.el, border: `1px solid ${C.ln}`, borderRadius: 10 }}><h3 style={{ fontSize: 16, color: C.pr, marginBottom: 8 }}>Практические советы</h3><p style={{ fontSize: 14, color: C.ink, lineHeight: 1.6, marginBottom: 8 }}>• Составьте молитвенный список из 5–10 человек. Напротив каждого имени — тип почвы. Это не ярлык, а стратегия.</p><p style={{ fontSize: 14, color: C.ink, lineHeight: 1.6, marginBottom: 8 }}>• Регулярность важнее силы. Лучше 30 минут ежедневно в течение года, чем один раз шесть часов и забыть.</p><p style={{ fontSize: 14, color: C.ink, lineHeight: 1.6, marginBottom: 8 }}>• Не переставайте, если ничего не видно. Иногда ответ приходит через 5 лет, иногда через 50.</p><p style={{ fontSize: 14, color: C.ink, lineHeight: 1.6, marginBottom: 8 }}>• Молитесь вдвоём или втроём. «Где двое или трое собраны во имя Моё, там Я посреди них» (Мф. 18:19–20).</p><p style={{ fontSize: 14, color: C.ink, lineHeight: 1.6, marginBottom: 8 }}>• Молитесь Писанием вслух: открывайте стихи для нужной почвы и молитесь ими, применяя к конкретному человеку.</p><p style={{ fontSize: 14, color: C.ink, lineHeight: 1.6 }}>• Помните: почва может меняться. Сегодня — первая почва. Через год — добрая земля. Именно ваши молитвы готовят это изменение.</p></div>
        </>}
      </div>
    </div>
  );
}

// ─── ADD FORM ────────────────────────────────────────────────────────
function AF({ add, cancel }) {
  const [n, setN] = useState(""); const [s, setS] = useState(1); const [nt, setNt] = useState(""); const r = useRef(null);
  useEffect(() => { r.current?.focus(); }, []);
  return <div style={{ background: C.el, borderRadius: 12, border: `1px solid ${C.ln}`, padding: 18, marginTop: 12 }}>
    <h3 style={{ fontSize: 17, color: C.pr, marginBottom: 14 }}>Добавить человека</h3>
    <input ref={r} value={n} onChange={e => setN(e.target.value)} placeholder="Имя" style={{ width: "100%", padding: "10px 12px", border: `1px solid ${C.ln}`, borderRadius: 8, fontSize: 16, fontFamily: "inherit", marginBottom: 10, background: C.bg, boxSizing: "border-box" }} />
    <div style={{ fontSize: 13, color: C.ink3, marginBottom: 6 }}>Тип почвы:</div>
    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 6, marginBottom: 10 }}>
      {[1,2,3,4].map(i => { const x = SOILS[i]; const a = s===i; return <button key={i} onClick={() => setS(i)} style={{ padding: "10px 8px", borderRadius: 8, border: `2px solid ${a?x.c:C.ln}`, background: a?x.cs:C.bg, cursor: "pointer", textAlign: "left", fontFamily: "inherit" }}><div style={{ fontSize: 14, fontWeight: "bold", color: C.ink }}>{x.icon} {x.name}</div><div style={{ fontSize: 11, color: C.ink3, marginTop: 2 }}>{x.sh}</div></button>; })}
    </div>
    <input value={nt} onChange={e => setNt(e.target.value)} placeholder="Заметка (необязательно)" style={{ width: "100%", padding: "10px 12px", border: `1px solid ${C.ln}`, borderRadius: 8, fontSize: 14, fontFamily: "inherit", marginBottom: 14, background: C.bg, boxSizing: "border-box" }} />
    <div style={{ display: "flex", gap: 8 }}><button onClick={() => n.trim() && add(n.trim(), s, nt.trim())} style={{ flex: 1, padding: 12, background: n.trim()?C.pr:C.ln, color: "#fff", border: "none", borderRadius: 10, fontSize: 15, fontFamily: "inherit", cursor: n.trim()?"pointer":"default" }}>Добавить</button><button onClick={cancel} style={{ padding: "12px 20px", background: "transparent", border: `1px solid ${C.ln}`, color: C.ink, borderRadius: 10, fontSize: 15, fontFamily: "inherit", cursor: "pointer" }}>Отмена</button></div>
  </div>;
}

// ─── PRAYER MODE ─────────────────────────────────────────────────────
function PM({ p, s, done, close }) {
  const [tm, setTm] = useState(0); const [run, setRun] = useState(false); const iv = useRef(null);
  useEffect(() => { if (run) iv.current = setInterval(() => setTm(t => t+1), 1000); else clearInterval(iv.current); return () => clearInterval(iv.current); }, [run]);
  const fmt = v => `${String(Math.floor(v/60)).padStart(2,"0")}:${String(v%60).padStart(2,"0")}`;
  const dn = p.ld === today(); const d = decl(p.name); const sub = t => t.replace(/{и}/g, d.и).replace(/{р}/g, d.р).replace(/{д}/g, d.д).replace(/{в}/g, d.в).replace(/{п}/g, d.п);

  return <div style={{ minHeight: "100vh", background: C.bg, fontFamily: "Georgia, serif" }}>
    <div style={{ background: s.c, padding: "12px 16px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
      <button onClick={close} style={{ background: "none", border: "none", color: "#fff", fontSize: 15, fontFamily: "inherit", cursor: "pointer" }}>← Назад</button>
      <div style={{ color: "#fff", fontWeight: "bold", fontSize: 15 }}>{s.icon} {p.name}</div>
      <div style={{ width: 50 }} />
    </div>
    <div style={{ textAlign: "center", padding: "16px 16px 8px" }}>
      <div style={{ fontSize: 40, fontWeight: "bold", color: C.ink, fontVariantNumeric: "tabular-nums" }}>{fmt(tm)}</div>
      <div style={{ display: "flex", justifyContent: "center", gap: 8, marginTop: 6 }}>
        <button onClick={() => setRun(!run)} style={{ padding: "7px 18px", borderRadius: 16, border: "none", background: run?C.s1:s.c, color: "#fff", fontSize: 14, fontFamily: "inherit", cursor: "pointer" }}>{run?"⏸ Пауза":"▶ Старт"}</button>
        {tm > 0 && <button onClick={() => { setTm(0); setRun(false); }} style={{ padding: "7px 14px", borderRadius: 16, border: `1px solid ${C.ln}`, background: "transparent", color: C.ink3, fontSize: 14, fontFamily: "inherit", cursor: "pointer" }}>Сброс</button>}
      </div>
    </div>
    <div style={{ padding: "10px 16px 120px" }}>
      <h3 style={{ fontSize: 16, color: s.c, marginBottom: 10 }}>Молитва</h3>
      <div style={{ borderLeft: `3px solid ${s.c}`, paddingLeft: 16, marginBottom: 14 }}>
        {s.prayer.map((x, i) => <p key={i} style={{ fontSize: 16, lineHeight: 1.7, color: C.ink, fontStyle: "italic", marginBottom: 12 }}>{sub(x)}</p>)}
      </div>
      <div style={{ padding: "10px 14px", background: C.sf, borderRadius: 8, marginBottom: 24, fontSize: 14, color: C.ink2, lineHeight: 1.55, fontStyle: "italic" }}>{s.pn}</div>
      {/* DIVIDER */}
      <div style={{ borderTop: `2px solid ${s.c}`, marginBottom: 20, position: "relative" }}><span style={{ position: "absolute", top: -12, left: 16, background: C.bg, padding: "0 10px", fontSize: 13, color: s.c, fontWeight: "bold" }}>Продолжите молитву Писанием</span></div>
      <p style={{ fontSize: 13, color: C.ink2, fontStyle: "italic", marginBottom: 14 }}>{sub(s.si)}</p>
      {s.sc.map((x, i) => <div key={i} style={{ padding: "10px 0", borderBottom: `1px dashed ${C.ln}` }}><div style={{ fontWeight: "bold", color: s.c, fontSize: 13, marginBottom: 3 }}>{x.r}</div><div style={{ fontStyle: "italic", color: C.ink, fontSize: 15, lineHeight: 1.55 }}>«{x.t}»</div></div>)}
    </div>
    <div style={{ position: "fixed", bottom: 0, left: 0, right: 0, padding: "12px 16px", background: C.bg, borderTop: `1px solid ${C.ln}` }}>
      <button onClick={done} style={{ width: "100%", padding: 14, borderRadius: 12, border: "none", background: dn?C.s4s:s.c, color: dn?C.s4:"#fff", fontSize: 16, fontFamily: "inherit", cursor: "pointer", fontWeight: "bold" }}>{dn?"✓ Уже отмечено":"✓ Помолился — отметить день"}</button>
    </div>
  </div>;
}

// ─── TEACHING DETAIL ─────────────────────────────────────────────────
function TD({ s, n, back }) {
  const [o, setO] = useState({ what: true }); const t = k => setO(v => ({ ...v, [k]: !v[k] }));
  return <div style={{ minHeight: "100vh", background: C.bg, fontFamily: "Georgia, serif" }}>
    <div style={{ background: s.c, padding: "12px 16px", display: "flex", alignItems: "center", gap: 10 }}>
      <button onClick={back} style={{ background: "none", border: "none", color: "#fff", fontSize: 15, fontFamily: "inherit", cursor: "pointer" }}>← Назад</button>
      <div style={{ color: "#fff", fontWeight: "bold", fontSize: 15 }}>{s.icon} Почва {n}. {s.name}</div>
    </div>
    <div style={{ padding: "16px 16px 80px", maxWidth: 600, margin: "0 auto" }}>
      <Q t={s.vt} r={s.verse} />
      <Cl title="Что это за люди" open={o.what} toggle={() => t("what")}>
        {s.teach.map((x, i) => <p key={i} style={{ fontSize: 15, lineHeight: 1.65, color: C.ink, marginBottom: 12 }}>{x}</p>)}
        <Q t={s.tq.t} r={s.tq.r} />
        {s.ta.map((x, i) => <p key={i} style={{ fontSize: 15, lineHeight: 1.65, color: C.ink, marginBottom: 12 }}>{x}</p>)}
      </Cl>
      <Cl title="Как их узнать" open={o.who} toggle={() => t("who")}>
        <ul style={{ paddingLeft: 20, margin: 0 }}>{s.who.map((x, i) => <li key={i} style={{ fontSize: 15, lineHeight: 1.6, color: C.ink, marginBottom: 6 }}>{x}</li>)}</ul>
      </Cl>
      <Cl title="Как за них молиться" open={o.how} toggle={() => t("how")}>
        {s.hpf.map((x, i) => <p key={i} style={{ fontSize: 15, lineHeight: 1.65, color: C.ink, marginBottom: 12 }}>{x}</p>)}
        <Q t={s.hpq.t} r={s.hpq.r} />
      </Cl>
      <Cl title="Примеры из жизни великих людей веры" open={o.he} toggle={() => t("he")}>
        {s.heroes.map((h, i) => <div key={i} style={{ padding: "10px 12px", background: C.sf, borderRadius: 8, borderLeft: `3px solid ${s.c}`, marginBottom: 8 }}><div style={{ fontWeight: "bold", color: s.c, fontSize: 14, marginBottom: 3 }}>{h.n}</div><div style={{ fontSize: 14, lineHeight: 1.6, color: C.ink }}>{h.s}</div></div>)}
      </Cl>
      <Cl title="Молитва" open={o.pr} toggle={() => t("pr")}>
        <div style={{ borderLeft: `3px solid ${s.c}`, paddingLeft: 14 }}>{s.prayer.map((x, i) => <p key={i} style={{ fontSize: 15, lineHeight: 1.65, fontStyle: "italic", color: C.ink, marginBottom: 10 }}>{clean(x)}</p>)}</div>
        <p style={{ fontSize: 14, color: C.ink2, marginTop: 10, fontStyle: "italic" }}>{s.pn}</p>
      </Cl>
      <Cl title="📖 Места Писания для молитвы (30 мин/день)" open={o.sc} toggle={() => t("sc")}>
        <p style={{ fontSize: 13, color: C.ink2, fontStyle: "italic", marginBottom: 12 }}>{clean(s.si)}</p>
        {s.sc.map((x, i) => <div key={i} style={{ padding: "8px 0", borderBottom: `1px dashed ${C.ln}` }}><div style={{ fontWeight: "bold", color: s.c, fontSize: 13, marginBottom: 2 }}>{x.r}</div><div style={{ fontStyle: "italic", color: C.ink, fontSize: 14, lineHeight: 1.55 }}>«{x.t}»</div></div>)}
      </Cl>
    </div>
  </div>;
}

// ─── SHARED ──────────────────────────────────────────────────────────
